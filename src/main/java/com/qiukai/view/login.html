<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>登录 / 注册 — 咔滋外卖</title>
<meta name="description" content="咔滋外卖登录注册页，全城好评商家，30分钟极速送达。" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fcf7ee;
    --coffee: #7d2c0f;
    --orange: #ff8342;
    --brown-mid: #af4f28;
    --beige: #f9eedc;
    --pale: #ffefd5;
    --coffee-dark: #664237;
    --green: #00704f;
    --mustard: #fed16a;
    --error: #e53935;
    --error-bg: #fde8e8;
  }

  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    background: var(--cream);
    color: var(--coffee);
    letter-spacing: -0.01em;
    overflow-x: hidden;
    min-height: 100vh;
  }

  .font-display { font-family: 'Boldonse', 'Noto Sans SC', sans-serif; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; }
  .font-cn-display { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; letter-spacing: -0.01em; line-height: 1.2; }

  /* ===== 背景装饰 ===== */
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.25; pointer-events: none; z-index: 0; }
  .bg-blob-1 { top: -100px; right: -80px; width: 400px; height: 400px; background: var(--orange); animation: blobFloat1 12s ease-in-out infinite; }
  .bg-blob-2 { bottom: -120px; left: -100px; width: 350px; height: 350px; background: var(--mustard); animation: blobFloat2 15s ease-in-out infinite; }
  .bg-blob-3 { top: 40%; left: 50%; width: 300px; height: 300px; background: var(--beige); animation: blobFloat3 18s ease-in-out infinite; }
  @keyframes blobFloat1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-30px, 40px) scale(1.1); } }
  @keyframes blobFloat2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px, -30px) scale(1.15); } }
  @keyframes blobFloat3 { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-40%,-60%) scale(0.9); } }

  /* ===== 顶部导航 ===== */
  .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
  .nav-blur { background: rgba(252, 247, 238, 0.72); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(125,44,15,.08); }

  /* ===== 汉堡动画舞台 ===== */
  .burger-stage {
    position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; pointer-events: none;
  }

  .burger-wrap {
    position: relative; width: 320px; height: 240px;
    transform: scale(0.2); opacity: 0;
    animation: burgerScaleUp 0.8s cubic-bezier(.22,1.5,.36,1) forwards;
  }

  @keyframes burgerScaleUp {
    0% { transform: scale(0.2); opacity: 0; }
    50% { opacity: 1; }
    70% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }

  .burger-svg { width: 100%; height: 100%; overflow: visible; }

  /* SVG 元素 transform-box */
  .burger-top, .burger-bottom, .cheese-body, .cheese-strands, .strand {
    transform-box: fill-box;
  }
  .cheese-body { transform-origin: center; }
  .strand { transform-origin: center; }

  /* 汉堡分裂动画 */
  .burger-top {
    animation: splitTop 1.3s cubic-bezier(.3,1.25,.5,1) 0.9s forwards;
  }
  .burger-bottom {
    animation: splitBottom 1.3s cubic-bezier(.3,1.25,.5,1) 0.9s forwards;
  }
  @keyframes splitTop {
    0% { transform: translateY(0); }
    100% { transform: translateY(-75px); }
  }
  @keyframes splitBottom {
    0% { transform: translateY(0); }
    100% { transform: translateY(75px); }
  }

  /* 芝士体拉伸 */
  .cheese-body {
    animation: cheeseStretch 1.3s cubic-bezier(.3,1.35,.5,1) 0.9s forwards;
  }
  @keyframes cheeseStretch {
    0% { transform: scaleY(1); opacity: 0.85; }
    55% { transform: scaleY(9); opacity: 0.6; }
    72% { transform: scaleY(8.2); opacity: 0.5; }
    88% { transform: scaleY(8.5); opacity: 0.35; }
    100% { transform: scaleY(8.3); opacity: 0.15; }
  }

  /* 芝士拉丝 */
  .strand {
    animation: strandStretch 1.6s ease-out 0.9s forwards;
  }
  .strand:nth-child(1) { animation-delay: 0.88s; animation-duration: 1.5s; }
  .strand:nth-child(2) { animation-delay: 0.94s; animation-duration: 1.35s; }
  .strand:nth-child(3) { animation-delay: 0.86s; animation-duration: 1.55s; }
  .strand:nth-child(4) { animation-delay: 0.92s; animation-duration: 1.4s; }
  .strand:nth-child(5) { animation-delay: 0.96s; animation-duration: 1.48s; }
  .strand:nth-child(6) { animation-delay: 0.9s; animation-duration: 1.32s; }
  .strand:nth-child(7) { animation-delay: 0.98s; animation-duration: 1.42s; }

  @keyframes strandStretch {
    0% { transform: scaleY(1) scaleX(1); opacity: 0; }
    8% { opacity: 1; }
    40% { transform: scaleY(22) scaleX(0.7); opacity: 0.95; }
    60% { transform: scaleY(20) scaleX(0.5); opacity: 0.7; }
    78% { transform: scaleY(18) scaleX(0.35); opacity: 0.35; }
    100% { transform: scaleY(17) scaleX(0.2); opacity: 0; }
  }

  /* 分裂后汉堡轻微浮动 */
  .burger-top.landed, .burger-bottom.landed {
    animation: burgerFloat 4s ease-in-out infinite;
  }
  .burger-bottom.landed { animation-delay: 0.5s; }
  @keyframes burgerFloat {
    0%,100% { transform: translateY(var(--split-y, 0)); }
    50% { transform: translateY(calc(var(--split-y, 0px) - 6px)); }
  }

  /* ===== 表单容器 ===== */
  .form-section {
    position: relative; z-index: 20;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 100px 20px 40px;
  }

  .form-card {
    width: 100%; max-width: 440px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 32px;
    box-shadow: 0 2px 4px -1px rgba(0,0,0,.08), 0 12px 24px -6px rgba(0,0,0,.10), 0 40px 56px -12px rgba(125,44,15,.18);
    padding: 36px 34px 32px;
    opacity: 0; transform: translateY(30px) scale(0.96);
    pointer-events: none;
    transition: opacity 0.7s cubic-bezier(.22,1,.36,1), transform 0.7s cubic-bezier(.22,1,.36,1);
  }
  .form-card.visible {
    opacity: 1; transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  /* ===== Tab 切换 ===== */
  .tab-switcher {
    display: flex; position: relative;
    background: var(--beige); border-radius: 100px;
    padding: 5px; margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1; padding: 11px 0; border: none; background: transparent;
    font-family: 'Noto Sans SC', sans-serif; font-weight: 700; font-size: 15px;
    color: var(--brown-mid); cursor: pointer; border-radius: 100px;
    transition: color 0.3s; position: relative; z-index: 2;
  }
  .tab-btn.active { color: #fff; }
  .tab-indicator {
    position: absolute; top: 5px; left: 5px;
    width: calc(50% - 5px); height: calc(100% - 10px);
    background: var(--orange); border-radius: 100px;
    transition: transform 0.35s cubic-bezier(.22,1,.36,1);
    box-shadow: 0 4px 12px -2px rgba(255,131,66,.45);
    z-index: 1;
  }
  .tab-indicator.right { transform: translateX(100%); }

  /* ===== 表单面板 ===== */
  .form-panel { display: none; }
  .form-panel.active { display: block; animation: panelFadeIn 0.4s cubic-bezier(.22,1,.36,1); }
  @keyframes panelFadeIn {
    from { opacity: 0; transform: translateX(15px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ===== 输入框 ===== */
  .input-group { position: relative; margin-bottom: 18px; }
  .input-label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--brown-mid); margin-bottom: 7px; letter-spacing: 0.01em;
  }
  .input-wrap {
    position: relative; display: flex; align-items: center;
    background: var(--cream); border: 2px solid var(--beige);
    border-radius: 16px; transition: all 0.25s;
  }
  .input-wrap:focus-within {
    border-color: var(--orange); background: #fff;
    box-shadow: 0 0 0 4px rgba(255,131,66,.12);
  }
  .input-wrap.error { border-color: var(--error); background: var(--error-bg); }
  .input-wrap.error:focus-within { box-shadow: 0 0 0 4px rgba(229,57,53,.1); }
  .input-wrap.valid { border-color: var(--green); }
  .input-wrap.valid:focus-within { box-shadow: 0 0 0 4px rgba(0,112,79,.1); }

  .input-icon {
    position: absolute; left: 14px; display: flex; align-items: center;
    color: var(--brown-mid); transition: color 0.25s; pointer-events: none;
  }
  .input-wrap:focus-within .input-icon { color: var(--orange); }

  .input-field {
    flex: 1; width: 100%; border: none; outline: none; background: transparent;
    font-size: 15px; color: var(--coffee); padding: 14px 14px 14px 46px;
    font-family: inherit;
  }
  .input-field::placeholder { color: #c9a98a; }

  .pwd-toggle {
    position: absolute; right: 12px; background: none; border: none;
    cursor: pointer; padding: 6px; border-radius: 8px; color: var(--brown-mid);
    display: flex; align-items: center; transition: all 0.2s;
  }
  .pwd-toggle:hover { color: var(--orange); background: var(--beige); }

  .error-msg {
    font-size: 12px; color: var(--error); margin-top: 5px; padding-left: 4px;
    display: none; animation: errorSlide 0.25s ease;
  }
  .error-msg.show { display: block; }
  @keyframes errorSlide {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 密码强度 */
  .pwd-strength { display: flex; gap: 4px; margin-top: 6px; }
  .pwd-bar { flex: 1; height: 3px; border-radius: 100px; background: var(--beige); transition: background 0.3s; }
  .pwd-bar.weak { background: var(--error); }
  .pwd-bar.medium { background: var(--orange); }
  .pwd-bar.strong { background: var(--green); }
  .pwd-strength-label { font-size: 11px; margin-top: 3px; font-weight: 600; }

  /* ===== 选项行 ===== */
  .options-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px; margin-top: -4px;
  }
  .checkbox-wrap {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 13px; color: var(--brown-mid); font-weight: 500;
  }
  .checkbox-wrap input { display: none; }
  .checkbox-custom {
    width: 20px; height: 20px; border: 2px solid var(--beige); border-radius: 6px;
    background: var(--cream); display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .checkbox-wrap input:checked + .checkbox-custom {
    background: var(--orange); border-color: var(--orange);
  }
  .checkbox-custom svg { opacity: 0; transition: opacity 0.2s; }
  .checkbox-wrap input:checked + .checkbox-custom svg { opacity: 1; }

  .link-text {
    font-size: 13px; font-weight: 600; color: var(--orange);
    text-decoration: none; transition: color 0.2s;
  }
  .link-text:hover { color: var(--coffee); text-decoration: underline; }

  /* ===== 按钮 ===== */
  .btn-submit {
    width: 100%; border: none; border-radius: 16px;
    padding: 15px; font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700; font-size: 16px; cursor: pointer;
    transition: transform 0.2s cubic-bezier(.22,1,.36,1), filter 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-user {
    background: var(--orange); color: #fff;
    box-shadow: 0 6px 16px -4px rgba(255,131,66,.5);
    margin-bottom: 12px;
  }
  .btn-user:hover { transform: scale(1.02); filter: brightness(1.05); }
  .btn-user:active { transform: scale(0.97); }

  .btn-admin {
    background: transparent; color: var(--coffee);
    border: 2px solid var(--coffee-dark);
  }
  .btn-admin:hover { background: var(--coffee-dark); color: #fff; transform: scale(1.02); }
  .btn-admin:active { transform: scale(0.97); }

  .btn-register {
    background: var(--orange); color: #fff;
    box-shadow: 0 6px 16px -4px rgba(255,131,66,.5);
  }
  .btn-register:hover { transform: scale(1.02); filter: brightness(1.05); }
  .btn-register:active { transform: scale(0.97); }

  /* ===== 分隔线 ===== */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0; color: var(--brown-mid); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--beige);
  }

  /* ===== 底部链接 ===== */
  .form-footer {
    text-align: center; margin-top: 22px; font-size: 13px;
    color: var(--brown-mid);
  }
  .form-footer a { color: var(--orange); font-weight: 600; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; left: 50%; bottom: 40px;
    transform: translateX(-50%) translateY(20px);
    background: var(--coffee); color: var(--pale);
    padding: 14px 26px; border-radius: 100px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 12px 32px -8px rgba(0,0,0,.3);
    z-index: 9999; opacity: 0;
    transition: all 0.35s cubic-bezier(.22,1,.36,1);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--error); }

  /* ===== 响应式 ===== */
  @media (max-width: 480px) {
    .form-card { padding: 28px 22px 26px; border-radius: 28px; }
    .form-section { padding: 90px 16px 30px; }
    .burger-wrap { width: 260px; height: 200px; }
  }
  @media (max-height: 700px) and (max-width: 480px) {
    .burger-wrap { width: 200px; height: 155px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .burger-wrap { animation: none; transform: scale(1); opacity: 1; }
    .burger-top { animation: none; transform: translateY(-75px); }
    .burger-bottom { animation: none; transform: translateY(75px); }
    .cheese-body { animation: none; transform: scaleY(8.3); opacity: 0.15; }
    .strand { animation: none; opacity: 0; }
    .form-card { transition: none; opacity: 1; transform: none; pointer-events: auto; }
    .bg-blob { animation: none; }
  }

  ::selection { background: var(--orange); color: #fff; }

  /* ===== 身份选择 ===== */
  .identity-buttons { display: flex; flex-direction: column; gap: 14px; }
  .identity-btn {
    display: flex; align-items: center; gap: 16px;
    width: 100%; padding: 18px 20px;
    border: 2px solid var(--beige); border-radius: 18px;
    background: var(--cream); cursor: pointer;
    transition: all 0.25s cubic-bezier(.22,1,.36,1);
    text-align: left;
  }
  .identity-btn:hover {
    border-color: var(--orange); background: #fff;
    transform: translateX(4px);
    box-shadow: 0 8px 20px -6px rgba(255,131,66,.3);
  }
  .identity-btn:active { transform: translateX(2px) scale(0.99); }
  .identity-btn .icon-circle {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.25s;
  }
  .identity-btn:hover .icon-circle { transform: scale(1.1); }
  .identity-btn .icon-circle.user { background: rgba(255,131,66,.15); color: var(--orange); }
  .identity-btn .icon-circle.merchant { background: rgba(0,112,79,.12); color: var(--green); }
  .identity-btn .icon-circle.admin { background: rgba(125,44,15,.12); color: var(--coffee); }
  .identity-btn .btn-text { flex: 1; }
  .identity-btn .btn-text strong { display: block; font-size: 16px; font-weight: 700; color: var(--coffee); }
  .identity-btn .btn-text small { font-size: 12px; color: var(--brown-mid); }
  .identity-btn .arrow { color: var(--brown-mid); transition: all 0.25s; }
  .identity-btn:hover .arrow { color: var(--orange); transform: translateX(4px); }

  /* ===== 视图切换 ===== */
  .role-view { display: none; }
  .role-view.active { display: block; animation: viewFadeIn 0.4s cubic-bezier(.22,1,.36,1); }
  @keyframes viewFadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 返回身份选择 */
  .back-identity {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--brown-mid);
    cursor: pointer; transition: color 0.2s; margin-bottom: 20px;
    background: none; border: none; font-family: inherit;
  }
  .back-identity:hover { color: var(--orange); }

  /* ===== 图片上传 ===== */
  .upload-area {
    width: 100%; border: 2px dashed var(--beige); border-radius: 14px;
    background: var(--cream); cursor: pointer; transition: all 0.25s;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .upload-area:hover { border-color: var(--orange); background: #fff; }
  .upload-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .upload-area .upload-placeholder { text-align: center; padding: 16px; color: var(--brown-mid); font-size: 12px; }
  .upload-area .upload-placeholder svg { margin: 0 auto 6px; display: block; }
  .upload-area.logo { height: 80px; width: 80px; border-radius: 16px; flex-shrink: 0; }
  .upload-area.cover { height: 100px; width: 100%; border-radius: 14px; }
  .upload-row { display: flex; gap: 14px; align-items: flex-start; }
  .upload-row .upload-info { flex: 1; }
</style>
</head>
<body>

<!-- 背景装饰 -->
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<!-- 顶部导航 -->
<header class="top-bar nav-blur">
  <nav class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
    <a href="index.html" class="font-display text-2xl tracking-tight" style="color: var(--coffee);">
      咔滋<span class="text-[10px] align-top ml-1" style="color:var(--orange);">外卖</span>
    </a>
    <a href="index.html" class="flex items-center gap-2 text-sm font-semibold transition" style="color: var(--brown-mid);" onmouseover="this.style.color='var(--orange)'" onmouseout="this.style.color='var(--brown-mid)'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      返回首页
    </a>
  </nav>
</header>

<!-- 汉堡动画舞台 -->
<div class="burger-stage" id="burgerStage" aria-hidden="true">
  <div class="burger-wrap" id="burgerWrap">
    <svg class="burger-svg" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bunTopGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f0c684"/>
          <stop offset="50%" stop-color="#d49642"/>
          <stop offset="100%" stop-color="#c68642"/>
        </linearGradient>
        <linearGradient id="bunBottomGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d49642"/>
          <stop offset="100%" stop-color="#b87432"/>
        </linearGradient>
        <linearGradient id="cheeseGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffd54f"/>
          <stop offset="50%" stop-color="#ffb300"/>
          <stop offset="100%" stop-color="#ffa726"/>
        </linearGradient>
        <linearGradient id="pattyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7d5a46"/>
          <stop offset="100%" stop-color="#5d4037"/>
        </linearGradient>
      </defs>

      <!-- 底部组 (先绘制，在底层) -->
      <g class="burger-bottom">
        <!-- 芝士下半 -->
        <path d="M15 105 L285 105 L282 116 L18 116 Z" fill="url(#cheeseGrad)"/>
        <!-- 芝士滴角 -->
        <path d="M15 105 L15 112 L22 108 Z" fill="#ffa726"/>
        <path d="M285 105 L285 112 L278 108 Z" fill="#ffa726"/>
        <!-- 肉饼 -->
        <rect x="20" y="114" width="260" height="24" rx="12" fill="url(#pattyGrad)"/>
        <ellipse cx="75" cy="126" rx="14" ry="3" fill="#4e342e" opacity="0.35"/>
        <ellipse cx="150" cy="122" rx="18" ry="3" fill="#4e342e" opacity="0.35"/>
        <ellipse cx="225" cy="127" rx="12" ry="3" fill="#4e342e" opacity="0.35"/>
        <!-- 底面包 -->
        <path d="M15 136 L285 136 Q285 164 258 169 L42 169 Q15 164 15 136 Z" fill="url(#bunBottomGrad)"/>
        <ellipse cx="150" cy="169" rx="115" ry="6" fill="#a86528" opacity="0.6"/>

<script src="api.js"></script>
<script>
  // ===== Toast 通知 =====
  function showToast(msg, type) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast' + (type ? ' ' + type : '');
    t.innerHTML = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => {
      t.classList.remove('show');
      setTimeout(() => t.remove(), 400);
    }, 2600);
  }

  // ===== 已登录则跳转 =====
  (async function checkLogin() {
    try {
      const u = await API.auth.currentUser();
      if (u) {
        const redirect = API.util.getParam('redirect');
        if (redirect) { window.location.href = redirect; return; }
        if (u.role === 1) { window.location.href = 'admin.html'; return; }
        if (u.role === 2) { window.location.href = 'merchant.html'; return; }
        window.location.href = 'index.html';
      }
    } catch (e) { /* ignore */ }
  })();

  // ===== 动画完成后显示表单（身份选择默认展示） =====
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const formCard = document.getElementById('formCard');
  const burgerTop = document.querySelector('.burger-top');
  const burgerBottom = document.querySelector('.burger-bottom');

  if (reduceMotion) {
    formCard.classList.add('visible');
  } else {
    // 动画时间线: 0.9s(放大) + 1.3s(分裂) = 2.2s, 表单在 2.3s 出现
    setTimeout(() => { formCard.classList.add('visible'); }, 2300);
    setTimeout(() => {
      burgerTop.style.setProperty('--split-y', '-75px');
      burgerBottom.style.setProperty('--split-y', '75px');
      burgerTop.classList.add('landed');
      burgerBottom.classList.add('landed');
    }, 2300);
  }

  // ===== 身份选择切换 =====
  const identityView = document.getElementById('identityView');
  const userView = document.getElementById('userView');
  const adminView = document.getElementById('adminView');
  const merchantView = document.getElementById('merchantView');
  const allViews = [identityView, userView, adminView, merchantView];
  const viewMap = { user: userView, admin: adminView, merchant: merchantView };

  function showView(view) {
    allViews.forEach(v => v.classList.remove('active'));
    // 强制重排以重新触发进入动画
    void view.offsetWidth;
    view.classList.add('active');
  }

  document.querySelectorAll('[data-identity]').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = viewMap[btn.dataset.identity];
      if (target) showView(target);
    });
  });

  document.querySelectorAll('[data-back]').forEach(btn => {
    btn.addEventListener('click', () => showView(identityView));
  });

  // ===== Tab 切换（按 scope 隔离：user / merchant） =====
  document.querySelectorAll('.tab-switcher').forEach(switcher => {
    const btns = switcher.querySelectorAll('.tab-btn');
    const indicator = switcher.querySelector('.tab-indicator');
    const view = switcher.closest('.role-view');
    const panels = view ? view.querySelectorAll('.form-panel') : [];
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        btns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        if (indicator) indicator.classList.toggle('right', tab === 'register');
        panels.forEach(panel => {
          panel.classList.remove('active');
          if (panel.dataset.form === tab) {
            requestAnimationFrame(() => panel.classList.add('active'));
          }
        });
      });
    });
  });

  // ===== 密码显示/隐藏（通用） =====
  document.querySelectorAll('.pwd-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const eyeOpen = btn.querySelector('.eye-open');
      const eyeClose = btn.querySelector('.eye-close');
      if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.classList.add('hidden');
        eyeClose.classList.remove('hidden');
      } else {
        input.type = 'password';
        eyeOpen.classList.remove('hidden');
        eyeClose.classList.add('hidden');
      }
    });
  });

  // ===== 表单验证规则 =====
  const rules = {
    username: (v) => {
      if (!v) return '请输入用户名';
      if (v.length < 3) return '用户名至少 3 个字符';
      if (v.length > 20) return '用户名最多 20 个字符';
      if (!/^[a-zA-Z0-9_]+$/.test(v)) return '用户名只能包含字母、数字和下划线';
      return '';
    },
    account: (v) => {
      if (!v) return '请输入用户名或手机号';
      if (v.length < 3) return '账号至少 3 个字符';
      return '';
    },
    phone: (v) => {
      if (!v) return '请输入手机号';
      if (!/^1[3-9]\d{9}$/.test(v)) return '请输入正确的手机号';
      return '';
    },
    password: (v) => {
      if (!v) return '请输入密码';
      if (v.length < 8) return '密码至少 8 位';
      if (!/[a-zA-Z]/.test(v)) return '密码需包含至少一个字母';
      if (!/\d/.test(v)) return '密码需包含至少一个数字';
      return '';
    },
    loginPassword: (v) => {
      if (!v) return '请输入密码';
      return '';
    },
    confirm: (v, original) => {
      if (!v) return '请再次输入密码';
      if (v !== original) return '两次输入的密码不一致';
      return '';
    },
    merchantName: (v) => {
      if (!v || !v.trim()) return '请输入商家名称';
      if (v.length > 64) return '商家名称最多 64 个字符';
      return '';
    },
    registrantName: (v) => {
      if (!v || !v.trim()) return '请输入注册人姓名';
      if (v.length > 32) return '注册人姓名最多 32 个字符';
      return '';
    },
    category: (v) => {
      if (!v) return '请选择商家分类';
      return '';
    }
  };

  // 设置字段状态
  function setFieldState(wrapId, errorId, errorMsg) {
    const wrap = document.getElementById(wrapId);
    const err = document.getElementById(errorId);
    if (!wrap || !err) return;
    if (errorMsg) {
      wrap.classList.add('error');
      wrap.classList.remove('valid');
      err.textContent = errorMsg;
      err.classList.add('show');
    } else {
      wrap.classList.remove('error');
      const field = wrap.querySelector('.input-field');
      if (field && field.value) wrap.classList.add('valid');
      else wrap.classList.remove('valid');
      err.classList.remove('show');
    }
  }

  // ===== 密码强度指示器 =====
  function updatePwdStrength(strengthEl, v) {
    if (!strengthEl) return;
    if (v.length > 0) {
      strengthEl.style.display = 'flex';
      let score = 0;
      if (v.length >= 8) score++;
      if (/[a-z]/.test(v) && /[A-Z]/.test(v)) score++;
      if (/\d/.test(v)) score++;
      if (/[^a-zA-Z0-9]/.test(v)) score++;
      const bars = strengthEl.querySelectorAll('.pwd-bar');
      bars.forEach(b => b.className = 'pwd-bar');
      if (score <= 1) bars[0].classList.add('weak');
      else if (score <= 2) { bars[0].classList.add('medium'); bars[1].classList.add('medium'); }
      else { bars[0].classList.add('strong'); bars[1].classList.add('strong'); bars[2].classList.add('strong'); }
    } else {
      strengthEl.style.display = 'none';
    }
  }

  // ===== 按钮加载状态 =====
  function setBtnLoading(btn, loading, loadingText) {
    if (!btn) return;
    if (loading) {
      btn.dataset.originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = loadingText || '处理中…';
    } else {
      btn.disabled = false;
      if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
    }
  }

  // ===== 用户登录实时验证 =====
  const userLoginAccount = document.getElementById('userLoginAccount');
  const userLoginPassword = document.getElementById('userLoginPassword');

  userLoginAccount.addEventListener('input', () => {
    setFieldState('userLoginAccountWrap', 'userLoginAccountError', rules.account(userLoginAccount.value));
  });
  userLoginPassword.addEventListener('input', () => {
    setFieldState('userLoginPasswordWrap', 'userLoginPasswordError', rules.loginPassword(userLoginPassword.value));
  });

  // ===== 用户注册实时验证 =====
  const userRegUsername = document.getElementById('userRegUsername');
  const userRegPhone = document.getElementById('userRegPhone');
  const userRegPassword = document.getElementById('userRegPassword');
  const userRegConfirm = document.getElementById('userRegConfirm');
  const userPwdStrength = document.getElementById('userPwdStrength');

  userRegUsername.addEventListener('input', () => {
    setFieldState('userRegUsernameWrap', 'userRegUsernameError', rules.username(userRegUsername.value));
  });
  userRegPhone.addEventListener('input', () => {
    userRegPhone.value = userRegPhone.value.replace(/\D/g, '');
    setFieldState('userRegPhoneWrap', 'userRegPhoneError', rules.phone(userRegPhone.value));
  });
  userRegPassword.addEventListener('input', () => {
    const v = userRegPassword.value;
    setFieldState('userRegPasswordWrap', 'userRegPasswordError', rules.password(v));
    updatePwdStrength(userPwdStrength, v);
    if (userRegConfirm.value) {
      setFieldState('userRegConfirmWrap', 'userRegConfirmError', rules.confirm(userRegConfirm.value, v));
    }
  });
  userRegConfirm.addEventListener('input', () => {
    setFieldState('userRegConfirmWrap', 'userRegConfirmError', rules.confirm(userRegConfirm.value, userRegPassword.value));
  });

  // ===== 管理员登录实时验证 =====
  const adminLoginAccount = document.getElementById('adminLoginAccount');
  const adminLoginPassword = document.getElementById('adminLoginPassword');

  adminLoginAccount.addEventListener('input', () => {
    setFieldState('adminLoginAccountWrap', 'adminLoginAccountError', rules.account(adminLoginAccount.value));
  });
  adminLoginPassword.addEventListener('input', () => {
    setFieldState('adminLoginPasswordWrap', 'adminLoginPasswordError', rules.loginPassword(adminLoginPassword.value));
  });

  // ===== 商家登录实时验证 =====
  const merchantLoginAccount = document.getElementById('merchantLoginAccount');
  const merchantLoginPassword = document.getElementById('merchantLoginPassword');

  merchantLoginAccount.addEventListener('input', () => {
    setFieldState('merchantLoginAccountWrap', 'merchantLoginAccountError', rules.account(merchantLoginAccount.value));
  });
  merchantLoginPassword.addEventListener('input', () => {
    setFieldState('merchantLoginPasswordWrap', 'merchantLoginPasswordError', rules.loginPassword(merchantLoginPassword.value));
  });

  // ===== 商家注册实时验证 =====
  const mRegMerchantName = document.getElementById('mRegMerchantName');
  const mRegName = document.getElementById('mRegName');
  const mRegPhone = document.getElementById('mRegPhone');
  const mRegUsername = document.getElementById('mRegUsername');
  const mRegPassword = document.getElementById('mRegPassword');
  const mRegConfirm = document.getElementById('mRegConfirm');
  const mRegCategory = document.getElementById('mRegCategory');
  const merchantPwdStrength = document.getElementById('merchantPwdStrength');

  mRegPhone.addEventListener('input', () => {
    mRegPhone.value = mRegPhone.value.replace(/\D/g, '');
    setFieldState('mRegPhoneWrap', 'mRegPhoneError', rules.phone(mRegPhone.value));
  });
  mRegMerchantName.addEventListener('input', () => {
    setFieldState('mRegMerchantNameWrap', 'mRegMerchantNameError', rules.merchantName(mRegMerchantName.value));
  });
  mRegName.addEventListener('input', () => {
    setFieldState('mRegNameWrap', 'mRegNameError', rules.registrantName(mRegName.value));
  });
  mRegUsername.addEventListener('input', () => {
    setFieldState('mRegUsernameWrap', 'mRegUsernameError', rules.username(mRegUsername.value));
  });
  mRegPassword.addEventListener('input', () => {
    const v = mRegPassword.value;
    setFieldState('mRegPasswordWrap', 'mRegPasswordError', rules.password(v));
    updatePwdStrength(merchantPwdStrength, v);
    if (mRegConfirm.value) {
      setFieldState('mRegConfirmWrap', 'mRegConfirmError', rules.confirm(mRegConfirm.value, v));
    }
  });
  mRegConfirm.addEventListener('input', () => {
    setFieldState('mRegConfirmWrap', 'mRegConfirmError', rules.confirm(mRegConfirm.value, mRegPassword.value));
  });
  mRegCategory.addEventListener('change', () => {
    setFieldState('mRegCategoryWrap', 'mRegCategoryError', rules.category(mRegCategory.value));
  });

  // ===== 商家图片上传（Logo + 封面） =====
  let logoUrl = '';
  let coverUrl = '';
  const mLogoUpload = document.getElementById('mLogoUpload');
  const mCoverUpload = document.getElementById('mCoverUpload');
  const mLogoFile = document.getElementById('mLogoFile');
  const mCoverFile = document.getElementById('mCoverFile');
  const logoPlaceholder = mLogoUpload.innerHTML;
  const coverPlaceholder = mCoverUpload.innerHTML;

  function renderUploadPreview(area, url, placeholderHtml) {
    if (url) {
      area.innerHTML = '<img src="' + url + '" alt="预览">';
    } else {
      area.innerHTML = placeholderHtml;
    }
  }

  async function handleUpload(file, area, placeholder, onSuccess) {
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      showToast('请上传图片文件 📷', 'error');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      showToast('图片大小不能超过 5MB 📷', 'error');
      return;
    }
    const localUrl = URL.createObjectURL(file);
    renderUploadPreview(area, localUrl, placeholder);
    area.style.opacity = '0.6';
    try {
      const url = await API.util.uploadImage(file);
      URL.revokeObjectURL(localUrl);
      onSuccess(url);
      renderUploadPreview(area, url, placeholder);
      showToast('图片上传成功 ✅', 'success');
    } catch (err) {
      URL.revokeObjectURL(localUrl);
      renderUploadPreview(area, '', placeholder);
      showToast(err.message || '图片上传失败', 'error');
    } finally {
      area.style.opacity = '1';
    }
  }

  mLogoUpload.addEventListener('click', () => mLogoFile.click());
  mCoverUpload.addEventListener('click', () => mCoverFile.click());
  mLogoFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    handleUpload(file, mLogoUpload, logoPlaceholder, (url) => { logoUrl = url; });
    e.target.value = '';
  });
  mCoverFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    handleUpload(file, mCoverUpload, coverPlaceholder, (url) => { coverUrl = url; });
    e.target.value = '';
  });

  // ===== 用户登录提交 =====
  document.getElementById('userLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const accountErr = rules.account(userLoginAccount.value);
    const pwdErr = rules.loginPassword(userLoginPassword.value);
    setFieldState('userLoginAccountWrap', 'userLoginAccountError', accountErr);
    setFieldState('userLoginPasswordWrap', 'userLoginPasswordError', pwdErr);
    if (accountErr || pwdErr) {
      showToast('请填写完整的登录信息 📝', 'error');
      return;
    }
    const remember = document.getElementById('rememberMe').checked;
    const btn = document.getElementById('userLoginBtn');
    setBtnLoading(btn, true, '登录中…');
    try {
      await API.auth.login(userLoginAccount.value.trim(), userLoginPassword.value, remember);
      showToast('登录成功，欢迎回来！🎉', 'success');
      const redirect = API.util.getParam('redirect') || 'index.html';
      setTimeout(() => { window.location.href = redirect; }, 800);
    } catch (err) {
      showToast(err.message || '登录失败', 'error');
      setBtnLoading(btn, false);
    }
  });

  // ===== 用户注册提交 =====
  document.getElementById('userRegisterForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const uErr = rules.username(userRegUsername.value);
    const phErr = rules.phone(userRegPhone.value);
    const pErr = rules.password(userRegPassword.value);
    const cErr = rules.confirm(userRegConfirm.value, userRegPassword.value);
    setFieldState('userRegUsernameWrap', 'userRegUsernameError', uErr);
    setFieldState('userRegPhoneWrap', 'userRegPhoneError', phErr);
    setFieldState('userRegPasswordWrap', 'userRegPasswordError', pErr);
    setFieldState('userRegConfirmWrap', 'userRegConfirmError', cErr);
    if (uErr || phErr || pErr || cErr) {
      showToast('请修正表单中的错误 📝', 'error');
      return;
    }
    const btn = e.target.querySelector('.btn-register');
    setBtnLoading(btn, true, '注册中…');
    try {
      await API.auth.register({
        username: userRegUsername.value.trim(),
        phone: userRegPhone.value.trim(),
        password: userRegPassword.value,
        confirmPassword: userRegConfirm.value,
        nickname: userRegUsername.value.trim()
      });
      showToast('注册成功！正在跳转登录… 🎉', 'success');
      setTimeout(() => {
        document.querySelector('[data-tab="login"][data-scope="user"]').click();
        userLoginAccount.value = userRegUsername.value.trim();
        setBtnLoading(btn, false);
      }, 1200);
    } catch (err) {
      showToast(err.message || '注册失败', 'error');
      setBtnLoading(btn, false);
    }
  });

  // ===== 管理员登录提交 =====
  document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const accountErr = rules.account(adminLoginAccount.value);
    const pwdErr = rules.loginPassword(adminLoginPassword.value);
    setFieldState('adminLoginAccountWrap', 'adminLoginAccountError', accountErr);
    setFieldState('adminLoginPasswordWrap', 'adminLoginPasswordError', pwdErr);
    if (accountErr || pwdErr) {
      showToast('请填写管理员账号和密码 🔐', 'error');
      return;
    }
    const btn = document.getElementById('adminLoginSubmitBtn');
    setBtnLoading(btn, true, '登录中…');
    try {
      await API.auth.adminLogin(adminLoginAccount.value.trim(), adminLoginPassword.value);
      showToast('正在进入管理员后台… 🛡️', 'success');
      setTimeout(() => { window.location.href = 'admin.html'; }, 800);
    } catch (err) {
      showToast(err.message || '登录失败', 'error');
      setBtnLoading(btn, false);
    }
  });

  // ===== 商家登录提交 =====
  document.getElementById('merchantLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const accountErr = rules.account(merchantLoginAccount.value);
    const pwdErr = rules.loginPassword(merchantLoginPassword.value);
    setFieldState('merchantLoginAccountWrap', 'merchantLoginAccountError', accountErr);
    setFieldState('merchantLoginPasswordWrap', 'merchantLoginPasswordError', pwdErr);
    if (accountErr || pwdErr) {
      showToast('请填写完整的登录信息 📝', 'error');
      return;
    }
    const btn = document.getElementById('merchantLoginBtn');
    setBtnLoading(btn, true, '登录中…');
    try {
      await API.auth.merchantLogin(merchantLoginAccount.value.trim(), merchantLoginPassword.value);
      showToast('登录成功，欢迎回来！🏪', 'success');
      const redirect = API.util.getParam('redirect') || 'merchant.html';
      setTimeout(() => { window.location.href = redirect; }, 800);
    } catch (err) {
      showToast(err.message || '登录失败', 'error');
      setBtnLoading(btn, false);
    }
  });

  // ===== 商家注册提交 =====
  document.getElementById('merchantRegisterForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const phoneErr = rules.phone(mRegPhone.value);
    const nameErr = rules.merchantName(mRegMerchantName.value);
    const regNameErr = rules.registrantName(mRegName.value);
    const uErr = rules.username(mRegUsername.value);
    const pErr = rules.password(mRegPassword.value);
    const cErr = rules.confirm(mRegConfirm.value, mRegPassword.value);
    const catErr = rules.category(mRegCategory.value);
    setFieldState('mRegPhoneWrap', 'mRegPhoneError', phoneErr);
    setFieldState('mRegMerchantNameWrap', 'mRegMerchantNameError', nameErr);
    setFieldState('mRegNameWrap', 'mRegNameError', regNameErr);
    setFieldState('mRegUsernameWrap', 'mRegUsernameError', uErr);
    setFieldState('mRegPasswordWrap', 'mRegPasswordError', pErr);
    setFieldState('mRegConfirmWrap', 'mRegConfirmError', cErr);
    setFieldState('mRegCategoryWrap', 'mRegCategoryError', catErr);
    if (phoneErr || nameErr || regNameErr || uErr || pErr || cErr || catErr) {
      showToast('请修正表单中的错误 📝', 'error');
      return;
    }
    if (!logoUrl) {
      mLogoUpload.style.borderColor = '#dc2626';
      showToast('请上传商家Logo 📷', 'error');
      return;
    }
    mLogoUpload.style.borderColor = '';
    if (!coverUrl) {
      mCoverUpload.style.borderColor = '#dc2626';
      showToast('请上传商家封面图 📷', 'error');
      return;
    }
    mCoverUpload.style.borderColor = '';
    const btn = document.getElementById('merchantRegisterBtn');
    setBtnLoading(btn, true, '注册中…');
    try {
      await API.auth.merchantRegister({
        phone: mRegPhone.value.trim(),
        merchantName: mRegMerchantName.value.trim(),
        registrantName: mRegName.value.trim(),
        username: mRegUsername.value.trim(),
        password: mRegPassword.value,
        confirmPassword: mRegConfirm.value,
        logo: logoUrl,
        cover: coverUrl,
        category: mRegCategory.value
      });
      showToast('商家注册成功！正在跳转登录… 🎉', 'success');
      setTimeout(() => {
        document.querySelector('[data-tab="login"][data-scope="merchant"]').click();
        merchantLoginAccount.value = mRegUsername.value.trim();
        setBtnLoading(btn, false);
      }, 1200);
    } catch (err) {
      showToast(err.message || '注册失败', 'error');
      setBtnLoading(btn, false);
    }
  });

  // ===== 忘记密码 =====
  document.getElementById('forgotPwdLink').addEventListener('click', (e) => {
    e.preventDefault();
    const account = userLoginAccount.value.trim();
    if (!account) {
      showToast('请先输入用户名或手机号 📧', 'info');
      userLoginAccount.focus();
      return;
    }
    showToast('密码重置链接已发送至您的手机 📬', 'success');
  });

  // ===== 键盘 Enter 提交 =====
  document.querySelectorAll('.input-field').forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const form = input.closest('form');
        if (form) form.dispatchEvent(new Event('submit', { cancelable: true }));
      }
    });
  });

</script>

</body>
</html>
