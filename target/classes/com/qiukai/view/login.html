<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>登录 / 注册 — 咔滋外卖</title>
<meta name="description" content="咔滋外卖登录注册页，全城好评商家，30分钟极速送达。" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fcf7ee;
    --coffee: #7d2c0f;
    --orange: #ff8342;
    --brown-mid: #af4f28;
    --beige: #f9eedc;
    --pale: #ffefd5;
    --coffee-dark: #664237;
    --green: #00704f;
    --mustard: #fed16a;
    --error: #e53935;
    --error-bg: #fde8e8;
  }

  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Manrope', 'Noto Sans SC', sans-serif;
    background: var(--cream);
    color: var(--coffee);
    letter-spacing: -0.01em;
    overflow-x: hidden;
    min-height: 100vh;
  }

  .font-display { font-family: 'Boldonse', 'Noto Sans SC', sans-serif; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; }
  .font-cn-display { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; letter-spacing: -0.01em; line-height: 1.2; }

  /* ===== 背景装饰 ===== */
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(60px); opacity: 0.25; pointer-events: none; z-index: 0; }
  .bg-blob-1 { top: -100px; right: -80px; width: 400px; height: 400px; background: var(--orange); animation: blobFloat1 12s ease-in-out infinite; }
  .bg-blob-2 { bottom: -120px; left: -100px; width: 350px; height: 350px; background: var(--mustard); animation: blobFloat2 15s ease-in-out infinite; }
  .bg-blob-3 { top: 40%; left: 50%; width: 300px; height: 300px; background: var(--beige); animation: blobFloat3 18s ease-in-out infinite; }
  @keyframes blobFloat1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-30px, 40px) scale(1.1); } }
  @keyframes blobFloat2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px, -30px) scale(1.15); } }
  @keyframes blobFloat3 { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-40%,-60%) scale(0.9); } }

  /* ===== 顶部导航 ===== */
  .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
  .nav-blur { background: rgba(252, 247, 238, 0.72); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(125,44,15,.08); }

  /* ===== 汉堡动画舞台 ===== */
  .burger-stage {
    position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; pointer-events: none;
  }

  .burger-wrap {
    position: relative; width: 320px; height: 240px;
    transform: scale(0.2); opacity: 0;
    animation: burgerScaleUp 0.8s cubic-bezier(.22,1.5,.36,1) forwards;
  }

  @keyframes burgerScaleUp {
    0% { transform: scale(0.2); opacity: 0; }
    50% { opacity: 1; }
    70% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }

  .burger-svg { width: 100%; height: 100%; overflow: visible; }

  /* SVG 元素 transform-box */
  .burger-top, .burger-bottom, .cheese-body, .cheese-strands, .strand {
    transform-box: fill-box;
  }
  .cheese-body { transform-origin: center; }
  .strand { transform-origin: center; }

  /* 汉堡分裂动画 */
  .burger-top {
    animation: splitTop 1.3s cubic-bezier(.3,1.25,.5,1) 0.9s forwards;
  }
  .burger-bottom {
    animation: splitBottom 1.3s cubic-bezier(.3,1.25,.5,1) 0.9s forwards;
  }
  @keyframes splitTop {
    0% { transform: translateY(0); }
    100% { transform: translateY(-75px); }
  }
  @keyframes splitBottom {
    0% { transform: translateY(0); }
    100% { transform: translateY(75px); }
  }

  /* 芝士体拉伸 */
  .cheese-body {
    animation: cheeseStretch 1.3s cubic-bezier(.3,1.35,.5,1) 0.9s forwards;
  }
  @keyframes cheeseStretch {
    0% { transform: scaleY(1); opacity: 0.85; }
    55% { transform: scaleY(9); opacity: 0.6; }
    72% { transform: scaleY(8.2); opacity: 0.5; }
    88% { transform: scaleY(8.5); opacity: 0.35; }
    100% { transform: scaleY(8.3); opacity: 0.15; }
  }

  /* 芝士拉丝 */
  .strand {
    animation: strandStretch 1.6s ease-out 0.9s forwards;
  }
  .strand:nth-child(1) { animation-delay: 0.88s; animation-duration: 1.5s; }
  .strand:nth-child(2) { animation-delay: 0.94s; animation-duration: 1.35s; }
  .strand:nth-child(3) { animation-delay: 0.86s; animation-duration: 1.55s; }
  .strand:nth-child(4) { animation-delay: 0.92s; animation-duration: 1.4s; }
  .strand:nth-child(5) { animation-delay: 0.96s; animation-duration: 1.48s; }
  .strand:nth-child(6) { animation-delay: 0.9s; animation-duration: 1.32s; }
  .strand:nth-child(7) { animation-delay: 0.98s; animation-duration: 1.42s; }

  @keyframes strandStretch {
    0% { transform: scaleY(1) scaleX(1); opacity: 0; }
    8% { opacity: 1; }
    40% { transform: scaleY(22) scaleX(0.7); opacity: 0.95; }
    60% { transform: scaleY(20) scaleX(0.5); opacity: 0.7; }
    78% { transform: scaleY(18) scaleX(0.35); opacity: 0.35; }
    100% { transform: scaleY(17) scaleX(0.2); opacity: 0; }
  }

  /* 分裂后汉堡轻微浮动 */
  .burger-top.landed, .burger-bottom.landed {
    animation: burgerFloat 4s ease-in-out infinite;
  }
  .burger-bottom.landed { animation-delay: 0.5s; }
  @keyframes burgerFloat {
    0%,100% { transform: translateY(var(--split-y, 0)); }
    50% { transform: translateY(calc(var(--split-y, 0px) - 6px)); }
  }

  /* ===== 表单容器 ===== */
  .form-section {
    position: relative; z-index: 20;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 100px 20px 40px;
  }

  .form-card {
    width: 100%; max-width: 440px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 32px;
    box-shadow: 0 2px 4px -1px rgba(0,0,0,.08), 0 12px 24px -6px rgba(0,0,0,.10), 0 40px 56px -12px rgba(125,44,15,.18);
    padding: 36px 34px 32px;
    opacity: 0; transform: translateY(30px) scale(0.96);
    pointer-events: none;
    transition: opacity 0.7s cubic-bezier(.22,1,.36,1), transform 0.7s cubic-bezier(.22,1,.36,1);
  }
  .form-card.visible {
    opacity: 1; transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  /* ===== Tab 切换 ===== */
  .tab-switcher {
    display: flex; position: relative;
    background: var(--beige); border-radius: 100px;
    padding: 5px; margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1; padding: 11px 0; border: none; background: transparent;
    font-family: 'Noto Sans SC', sans-serif; font-weight: 700; font-size: 15px;
    color: var(--brown-mid); cursor: pointer; border-radius: 100px;
    transition: color 0.3s; position: relative; z-index: 2;
  }
  .tab-btn.active { color: #fff; }
  .tab-indicator {
    position: absolute; top: 5px; left: 5px;
    width: calc(50% - 5px); height: calc(100% - 10px);
    background: var(--orange); border-radius: 100px;
    transition: transform 0.35s cubic-bezier(.22,1,.36,1);
    box-shadow: 0 4px 12px -2px rgba(255,131,66,.45);
    z-index: 1;
  }
  .tab-indicator.right { transform: translateX(100%); }

  /* ===== 表单面板 ===== */
  .form-panel { display: none; }
  .form-panel.active { display: block; animation: panelFadeIn 0.4s cubic-bezier(.22,1,.36,1); }
  @keyframes panelFadeIn {
    from { opacity: 0; transform: translateX(15px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ===== 输入框 ===== */
  .input-group { position: relative; margin-bottom: 18px; }
  .input-label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--brown-mid); margin-bottom: 7px; letter-spacing: 0.01em;
  }
  .input-wrap {
    position: relative; display: flex; align-items: center;
    background: var(--cream); border: 2px solid var(--beige);
    border-radius: 16px; transition: all 0.25s;
  }
  .input-wrap:focus-within {
    border-color: var(--orange); background: #fff;
    box-shadow: 0 0 0 4px rgba(255,131,66,.12);
  }
  .input-wrap.error { border-color: var(--error); background: var(--error-bg); }
  .input-wrap.error:focus-within { box-shadow: 0 0 0 4px rgba(229,57,53,.1); }
  .input-wrap.valid { border-color: var(--green); }
  .input-wrap.valid:focus-within { box-shadow: 0 0 0 4px rgba(0,112,79,.1); }

  .input-icon {
    position: absolute; left: 14px; display: flex; align-items: center;
    color: var(--brown-mid); transition: color 0.25s; pointer-events: none;
  }
  .input-wrap:focus-within .input-icon { color: var(--orange); }

  .input-field {
    flex: 1; width: 100%; border: none; outline: none; background: transparent;
    font-size: 15px; color: var(--coffee); padding: 14px 14px 14px 46px;
    font-family: inherit;
  }
  .input-field::placeholder { color: #c9a98a; }

  .pwd-toggle {
    position: absolute; right: 12px; background: none; border: none;
    cursor: pointer; padding: 6px; border-radius: 8px; color: var(--brown-mid);
    display: flex; align-items: center; transition: all 0.2s;
  }
  .pwd-toggle:hover { color: var(--orange); background: var(--beige); }

  .error-msg {
    font-size: 12px; color: var(--error); margin-top: 5px; padding-left: 4px;
    display: none; animation: errorSlide 0.25s ease;
  }
  .error-msg.show { display: block; }
  @keyframes errorSlide {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 密码强度 */
  .pwd-strength { display: flex; gap: 4px; margin-top: 6px; }
  .pwd-bar { flex: 1; height: 3px; border-radius: 100px; background: var(--beige); transition: background 0.3s; }
  .pwd-bar.weak { background: var(--error); }
  .pwd-bar.medium { background: var(--orange); }
  .pwd-bar.strong { background: var(--green); }
  .pwd-strength-label { font-size: 11px; margin-top: 3px; font-weight: 600; }

  /* ===== 选项行 ===== */
  .options-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px; margin-top: -4px;
  }
  .checkbox-wrap {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 13px; color: var(--brown-mid); font-weight: 500;
  }
  .checkbox-wrap input { display: none; }
  .checkbox-custom {
    width: 20px; height: 20px; border: 2px solid var(--beige); border-radius: 6px;
    background: var(--cream); display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .checkbox-wrap input:checked + .checkbox-custom {
    background: var(--orange); border-color: var(--orange);
  }
  .checkbox-custom svg { opacity: 0; transition: opacity 0.2s; }
  .checkbox-wrap input:checked + .checkbox-custom svg { opacity: 1; }

  .link-text {
    font-size: 13px; font-weight: 600; color: var(--orange);
    text-decoration: none; transition: color 0.2s;
  }
  .link-text:hover { color: var(--coffee); text-decoration: underline; }

  /* ===== 按钮 ===== */
  .btn-submit {
    width: 100%; border: none; border-radius: 16px;
    padding: 15px; font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700; font-size: 16px; cursor: pointer;
    transition: transform 0.2s cubic-bezier(.22,1,.36,1), filter 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-user {
    background: var(--orange); color: #fff;
    box-shadow: 0 6px 16px -4px rgba(255,131,66,.5);
    margin-bottom: 12px;
  }
  .btn-user:hover { transform: scale(1.02); filter: brightness(1.05); }
  .btn-user:active { transform: scale(0.97); }

  .btn-admin {
    background: transparent; color: var(--coffee);
    border: 2px solid var(--coffee-dark);
  }
  .btn-admin:hover { background: var(--coffee-dark); color: #fff; transform: scale(1.02); }
  .btn-admin:active { transform: scale(0.97); }

  .btn-register {
    background: var(--orange); color: #fff;
    box-shadow: 0 6px 16px -4px rgba(255,131,66,.5);
  }
  .btn-register:hover { transform: scale(1.02); filter: brightness(1.05); }
  .btn-register:active { transform: scale(0.97); }

  /* ===== 分隔线 ===== */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0; color: var(--brown-mid); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--beige);
  }

  /* ===== 底部链接 ===== */
  .form-footer {
    text-align: center; margin-top: 22px; font-size: 13px;
    color: var(--brown-mid);
  }
  .form-footer a { color: var(--orange); font-weight: 600; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; left: 50%; bottom: 40px;
    transform: translateX(-50%) translateY(20px);
    background: var(--coffee); color: var(--pale);
    padding: 14px 26px; border-radius: 100px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 12px 32px -8px rgba(0,0,0,.3);
    z-index: 9999; opacity: 0;
    transition: all 0.35s cubic-bezier(.22,1,.36,1);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--error); }

  /* ===== 响应式 ===== */
  @media (max-width: 480px) {
    .form-card { padding: 28px 22px 26px; border-radius: 28px; }
    .form-section { padding: 90px 16px 30px; }
    .burger-wrap { width: 260px; height: 200px; }
  }
  @media (max-height: 700px) and (max-width: 480px) {
    .burger-wrap { width: 200px; height: 155px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .burger-wrap { animation: none; transform: scale(1); opacity: 1; }
    .burger-top { animation: none; transform: translateY(-75px); }
    .burger-bottom { animation: none; transform: translateY(75px); }
    .cheese-body { animation: none; transform: scaleY(8.3); opacity: 0.15; }
    .strand { animation: none; opacity: 0; }
    .form-card { transition: none; opacity: 1; transform: none; pointer-events: auto; }
    .bg-blob { animation: none; }
  }

  ::selection { background: var(--orange); color: #fff; }
</style>
</head>
<body>

<!-- 背景装饰 -->
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<!-- 顶部导航 -->
<header class="top-bar nav-blur">
  <nav class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>

</header>

<!-- 汉堡动画舞台 -->
<div class="burger-stage" id="burgerStage" aria-hidden="true">
  <div class="burger-wrap" id="burgerWrap">
    <svg class="burger-svg" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bunTopGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f0c684"/>
          <stop offset="50%" stop-color="#d49642"/>
          <stop offset="100%" stop-color="#c68642"/>
        </linearGradient>
        <linearGradient id="bunBottomGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d49642"/>
          <stop offset="100%" stop-color="#b87432"/>
        </linearGradient>
        <linearGradient id="cheeseGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffd54f"/>
          <stop offset="50%" stop-color="#ffb300"/>
          <stop offset="100%" stop-color="#ffa726"/>
        </linearGradient>
        <linearGradient id="pattyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7d5a46"/>
          <stop offset="100%" stop-color="#5d4037"/>
        </linearGradient>
      </defs>

      <!-- 底部组 (先绘制，在底层) -->
      <g class="burger-bottom">
        <!-- 芝士下半 -->
        <path d="M15 105 L285 105 L282 116 L18 116 Z" fill="url(#cheeseGrad)"/>
        <!-- 芝士滴角 -->
        <path d="M15 105 L15 112 L22 108 Z" fill="#ffa726"/>
        <path d="M285 105 L285 112 L278 108 Z" fill="#ffa726"/>
        <!-- 肉饼 -->
        <rect x="20" y="114" width="260" height="24" rx="12" fill="url(#pattyGrad)"/>
        <ellipse cx="75" cy="126" rx="14" ry="3" fill="#4e342e" opacity="0.35"/>
        <ellipse cx="150" cy="122" rx="18" ry="3" fill="#4e342e" opacity="0.35"/>
        <ellipse cx="225" cy="127" rx="12" ry="3" fill="#4e342e" opacity="0.35"/>
        <!-- 底面包 -->
        <path d="M15 136 L285 136 Q285 164 258 169 L42 169 Q15 164 15 136 Z" fill="url(#bunBottomGrad)"/>
        <ellipse cx="150" cy="169" rx="115" ry="6" fill="#a86528" opacity="0.6"/>
        <!-- 底面包芝麻 -->
        <ellipse cx="80" cy="145" rx="4" ry="2" fill="#fff5e0" opacity="0.6"/>

        <ellipse cx="220" cy="145" rx="4" ry="2" fill="#fff5e0" opacity="0.6"/>
      </g>

      <!-- 芝士体 (拉伸) -->
      <g class="cheese-body">
        <rect x="20" y="100" width="260" height="12" fill="url(#cheeseGrad)" rx="2"/>
      </g>

      <!-- 芝士拉丝 -->
      <g class="cheese-strands">
        <rect class="strand" x="48" y="102" width="6" height="8" rx="3" fill="#ffd54f"/>
        <rect class="strand" x="82" y="102" width="5" height="8" rx="2.5" fill="#ffb300"/>
        <rect class="strand" x="118" y="102" width="7" height="8" rx="3.5" fill="#ffd54f"/>
        <rect class="strand" x="155" y="102" width="5" height="8" rx="2.5" fill="#ffa726"/>
        <rect class="strand" x="192" y="102" width="6" height="8" rx="3" fill="#ffd54f"/>
        <rect class="strand" x="228" y="102" width="4" height="8" rx="2" fill="#ffb300"/>
        <rect class="strand" x="255" y="102" width="5" height="8" rx="2.5" fill="#ffa726"/>
      </g>

      <!-- 顶部组 (最后绘制，在顶层) -->
      <g class="burger-top">
        <!-- 顶面包 -->
        <path d="M15 82 Q150 -2 285 82 L285 90 L15 90 Z" fill="url(#bunTopGrad)"/>
        <!-- 面包高光 -->
        <path d="M55 65 Q150 28 245 65" stroke="#ffe0b2" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
        <!-- 芝麻 -->
        <ellipse cx="80" cy="50" rx="5" ry="2.5" fill="#fff5e0" transform="rotate(-15 80 50)"/>
        <ellipse cx="120" cy="35" rx="5" ry="2.5" fill="#fff5e0" transform="rotate(10 120 35)"/>
        <ellipse cx="165" cy="28" rx="5" ry="2.5" fill="#fff5e0" transform="rotate(-5 165 28)"/>
        <ellipse cx="210" cy="38" rx="5" ry="2.5" fill="#fff5e0" transform="rotate(20 210 38)"/>
        <ellipse cx="150" cy="48" rx="5" ry="2.5" fill="#fff5e0"/>
        <ellipse cx="100" cy="62" rx="4" ry="2" fill="#fff5e0" opacity="0.7"/>
        <ellipse cx="195" cy="60" rx="4" ry="2" fill="#fff5e0" opacity="0.7"/>
        <!-- 生菜 -->
        <path d="M12 86 Q22 98 32 86 Q42 98 52 86 Q62 98 72 86 Q82 98 92 86 Q102 98 112 86 Q122 98 132 86 Q142 98 152 86 Q162 98 172 86 Q182 98 192 86 Q202 98 212 86 Q222 98 232 86 Q242 98 252 86 Q262 98 272 86 Q282 98 288 86 L288 92 L12 92 Z" fill="#7cb342"/>
        <path d="M12 88 Q22 96 32 90 Q42 96 52 90 Q62 96 72 90 Q82 96 92 90 Q102 96 112 90 Q122 96 132 90 Q142 96 152 90 Q162 96 172 90 Q182 96 192 90 Q202 96 212 90 Q222 96 232 90 Q242 96 252 90 Q262 96 272 90 Q282 96 288 90" stroke="#558b2f" stroke-width="1.5" fill="none" opacity="0.4"/>
        <!-- 番茄 -->
        <ellipse cx="150" cy="96" rx="132" ry="7" fill="#e53935"/>

<script src="api.js"></script>
<script>
  // ===== Toast 通知 =====
  function showToast(msg, type) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast' + (type ? ' ' + type : '');
    t.innerHTML = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => {
      t.classList.remove('show');
      setTimeout(() => t.remove(), 400);
    }, 2600);
  }

  // ===== 已登录则跳转 =====
  (async function checkLogin() {
    try {
      const u = await API.auth.currentUser();
      if (u) {
        const redirect = API.util.getParam('redirect') || 'index.html';
        window.location.href = redirect;
      }
    } catch (e) { /* ignore */ }
  })();

  // ===== 动画完成后显示表单 =====
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const formCard = document.getElementById('formCard');
  const burgerTop = document.querySelector('.burger-top');
  const burgerBottom = document.querySelector('.burger-bottom');

  if (reduceMotion) {
    formCard.classList.add('visible');
  } else {
    // 动画时间线: 0.9s(放大) + 1.3s(分裂) = 2.2s, 表单在 2.3s 出现
    setTimeout(() => {
      formCard.classList.add('visible');
    }, 2300);
    // 分裂动画完成后添加浮动效果
    setTimeout(() => {
      burgerTop.style.setProperty('--split-y', '-75px');
      burgerBottom.style.setProperty('--split-y', '75px');
      burgerTop.classList.add('landed');
      burgerBottom.classList.add('landed');
    }, 2300);
  }

  // ===== Tab 切换 =====
  const tabBtns = document.querySelectorAll('.tab-btn');
  const tabIndicator = document.getElementById('tabIndicator');
  const formPanels = document.querySelectorAll('.form-panel');

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      tabBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
      tabIndicator.classList.toggle('right', tab === 'register');

      formPanels.forEach(panel => {
        panel.classList.remove('active');
        if (panel.dataset.form === tab) {
          // 延迟添加 active 以触发动画
          requestAnimationFrame(() => panel.classList.add('active'));
        }
      });
    });
  });

  // ===== 密码显示/隐藏 =====
  document.querySelectorAll('.pwd-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const targetId = btn.dataset.target;
      const input = document.getElementById(targetId);
      const eyeOpen = btn.querySelector('.eye-open');
      const eyeClose = btn.querySelector('.eye-close');
      if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.classList.add('hidden');
        eyeClose.classList.remove('hidden');
      } else {
        input.type = 'password';
        eyeOpen.classList.remove('hidden');
        eyeClose.classList.add('hidden');
      }
    });
  });

  // ===== 表单验证规则 =====
  const rules = {
    username: (v) => {
      if (!v) return '请输入用户名';
      if (v.length < 3) return '用户名至少 3 个字符';
      if (v.length > 20) return '用户名最多 20 个字符';
      if (!/^[a-zA-Z0-9_]+$/.test(v)) return '用户名只能包含字母、数字和下划线';
      return '';
    },
    account: (v) => {
      if (!v) return '请输入用户名或邮箱';
      if (v.length < 3) return '账号至少 3 个字符';
      return '';
    },
    phone: (v) => {
      if (!v) return '请输入手机号';
      if (!/^1[3-9]\d{9}$/.test(v)) return '请输入正确的手机号';
      return '';
    },
    password: (v) => {
      if (!v) return '请输入密码';
      if (v.length < 8) return '密码至少 8 位';
      if (!/[a-zA-Z]/.test(v)) return '密码需包含至少一个字母';
      if (!/\d/.test(v)) return '密码需包含至少一个数字';
      return '';
    },
    loginPassword: (v) => {
      if (!v) return '请输入密码';
      if (v.length < 1) return '请输入密码';
      return '';
    },
    confirm: (v, original) => {
      if (!v) return '请再次输入密码';
      if (v !== original) return '两次输入的密码不一致';
      return '';
    }
  };

  // 设置字段状态
  function setFieldState(wrapId, errorId, errorMsg) {
    const wrap = document.getElementById(wrapId);
    const err = document.getElementById(errorId);
    if (errorMsg) {
      wrap.classList.add('error');
      wrap.classList.remove('valid');
      err.textContent = errorMsg;
      err.classList.add('show');
    } else {
      wrap.classList.remove('error');
      if (wrap.querySelector('.input-field').value) wrap.classList.add('valid');
      else wrap.classList.remove('valid');
      err.classList.remove('show');
    }
  }

  // 实时验证 - 登录表单
  const loginAccount = document.getElementById('loginAccount');
  const loginPassword = document.getElementById('loginPassword');

  loginAccount.addEventListener('input', () => {
    setFieldState('loginAccountWrap', 'loginAccountError', rules.account(loginAccount.value));
  });
  loginPassword.addEventListener('input', () => {
    setFieldState('loginPasswordWrap', 'loginPasswordError', rules.loginPassword(loginPassword.value));
  });

  // 实时验证 - 注册表单
  const regUsername = document.getElementById('regUsername');
  const regPhone = document.getElementById('regPhone');
  const regPassword = document.getElementById('regPassword');
  const regConfirm = document.getElementById('regConfirm');
  const pwdStrength = document.getElementById('pwdStrength');

  regUsername.addEventListener('input', () => {
    setFieldState('regUsernameWrap', 'regUsernameError', rules.username(regUsername.value));
  });
  regPhone.addEventListener('input', () => {
    // 仅允许输入数字
    regPhone.value = regPhone.value.replace(/\D/g, '');
    setFieldState('regPhoneWrap', 'regPhoneError', rules.phone(regPhone.value));
  });

  // 密码强度
  regPassword.addEventListener('input', () => {
    const v = regPassword.value;
    setFieldState('regPasswordWrap', 'regPasswordError', rules.password(v));
    // 强度计算
    if (v.length > 0) {
      pwdStrength.style.display = 'flex';
      let score = 0;
      if (v.length >= 8) score++;
      if (/[a-z]/.test(v) && /[A-Z]/.test(v)) score++;
      if (/\d/.test(v)) score++;
      if (/[^a-zA-Z0-9]/.test(v)) score++;
      const bars = pwdStrength.querySelectorAll('.pwd-bar');
      bars.forEach(b => b.className = 'pwd-bar');
      if (score <= 1) bars[0].classList.add('weak');
      else if (score <= 2) { bars[0].classList.add('medium'); bars[1].classList.add('medium'); }
      else { bars[0].classList.add('strong'); bars[1].classList.add('strong'); bars[2].classList.add('strong'); }
    } else {
      pwdStrength.style.display = 'none';
    }
    // 联动确认密码验证
    if (regConfirm.value) {
      setFieldState('regConfirmWrap', 'regConfirmError', rules.confirm(regConfirm.value, v));
    }
  });

  regConfirm.addEventListener('input', () => {
    setFieldState('regConfirmWrap', 'regConfirmError', rules.confirm(regConfirm.value, regPassword.value));
  });

  // ===== 登录表单提交 =====
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const accountErr = rules.account(loginAccount.value);
    const pwdErr = rules.loginPassword(loginPassword.value);
    setFieldState('loginAccountWrap', 'loginAccountError', accountErr);
    setFieldState('loginPasswordWrap', 'loginPasswordError', pwdErr);
    if (accountErr || pwdErr) {
      showToast('请填写完整的登录信息 📝', 'error');
      return;
    }
    const remember = document.getElementById('rememberMe').checked;
    const btn = document.getElementById('userLoginBtn');
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '登录中…';
    try {
      await API.auth.login(loginAccount.value.trim(), loginPassword.value, remember);
      showToast('登录成功，欢迎回来！🎉', 'success');
      const redirect = API.util.getParam('redirect') || 'index.html';
      setTimeout(() => { window.location.href = redirect; }, 800);
    } catch (err) {
      showToast(err.message || '登录失败', 'error');
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    }
  });

  // ===== 管理员登录 =====
  document.getElementById('adminLoginBtn').addEventListener('click', async () => {
    const accountErr = rules.account(loginAccount.value);
    const pwdErr = rules.loginPassword(loginPassword.value);
    setFieldState('loginAccountWrap', 'loginAccountError', accountErr);
    setFieldState('loginPasswordWrap', 'loginPasswordError', pwdErr);
    if (accountErr || pwdErr) {
      showToast('请填写管理员账号和密码 🔐', 'error');
      return;
    }
    const btn = document.getElementById('adminLoginBtn');
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '登录中…';
    try {
      await API.auth.adminLogin(loginAccount.value.trim(), loginPassword.value);
      showToast('正在进入管理员后台… 🛡️', 'info');
      setTimeout(() => { window.location.href = 'admin.html'; }, 800);
    } catch (err) {
      showToast(err.message || '登录失败', 'error');
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    }
  });

  // ===== 注册表单提交 =====
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const uErr = rules.username(regUsername.value);
    const phErr = rules.phone(regPhone.value);
    const pErr = rules.password(regPassword.value);
    const cErr = rules.confirm(regConfirm.value, regPassword.value);
    setFieldState('regUsernameWrap', 'regUsernameError', uErr);
    setFieldState('regPhoneWrap', 'regPhoneError', phErr);
    setFieldState('regPasswordWrap', 'regPasswordError', pErr);
    setFieldState('regConfirmWrap', 'regConfirmError', cErr);
    if (uErr || phErr || pErr || cErr) {
      showToast('请修正表单中的错误 📝', 'error');
      return;
    }
    const btn = e.target.querySelector('.btn-register');
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '注册中…';
    try {
      await API.auth.register({
        username: regUsername.value.trim(),
        phone: regPhone.value.trim(),
        password: regPassword.value,
        confirmPassword: regConfirm.value,
        nickname: regUsername.value.trim()
      });
      showToast('注册成功！正在跳转登录… 🎉', 'success');
      setTimeout(() => {
        // 切换到登录 Tab
        document.querySelector('[data-tab="login"]').click();
        loginAccount.value = regUsername.value;
        btn.disabled = false;
        btn.innerHTML = originalHTML;
      }, 1200);
    } catch (err) {
      showToast(err.message || '注册失败', 'error');
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    }
  });

  // ===== 忘记密码 =====
  document.getElementById('forgotPwdLink').addEventListener('click', (e) => {
    e.preventDefault();
    const account = loginAccount.value.trim();
    if (!account) {
      showToast('请先输入用户名或邮箱 📧', 'info');
      loginAccount.focus();
      return;
    }
    showToast('密码重置链接已发送至您的邮箱 📬', 'success');
  });

  // ===== 键盘 Enter 提交 =====
  document.querySelectorAll('.input-field').forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const form = input.closest('form');
        form.dispatchEvent(new Event('submit', { cancelable: true }));
      }
    });
  });
</script>

</body>
</html>
